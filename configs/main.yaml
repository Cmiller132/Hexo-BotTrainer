game:
  name: hexo
  crop_size: 37
  rules_version: 1
  max_placements: 500

model:
  package: hexo_resnet
  variant: base
  channels: 96
  residual_blocks: 8
  precision: fp16

selfplay:
  games_per_cycle: 1000
  actors: 12
  mcts_visits: 128
  temperature_placements: 32
  dirichlet_noise: true

mcts:
  c_puct: 1.5
  root_noise_alpha: 0.3
  root_noise_frac: 0.25

inference:
  batch_size: 96
  device: cuda

training:
  batch_size: 256
  steps_per_cycle: 1500
  replay_window_samples: 500000
  learning_rate: 0.0002
  weight_decay: 0.0001
  amp: true
  grad_clip_norm: 1.0

checkpointing:
  latest_path: data/checkpoints/latest.pt
  keep_last: 20

loop:
  cycles: 1000

