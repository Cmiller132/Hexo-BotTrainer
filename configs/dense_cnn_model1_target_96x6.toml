# Model 1 TARGET config — the coupled (sims + head + trunk) fix as ONE fresh run.
#
# This is a FRESH run, NOT a resume of dense_cnn_model1_scratch_64: the policy
# head (P7, fully-conv) and trunk shape (96ch x 6block) both change the checkpoint
# shape, so epoch_000022.pt will NOT load. Output goes to a new run dir.
#
# The three coupled changes (per analysis/optimization_plan.md + the policy-
# diffuseness investigation), shipped together:
#   - P7 fully-conv policy head  (automatic: architecture.py PolicyHead is now conv)
#   - channels 64 -> 96
#   - residual_blocks 4 -> 6
#   - search_visits 128 -> 512
# Verified ready (Phase 4): model instantiates (2.12M params), a forward+AMP train
# step fits in 12 GB VRAM at bs256 (peak ~3.9 GB / 32%; bs128 ~2.0 GB), FP16 forward
# is 2.5-2.9x and numerically safe at 96x6, and the inference-optimized (conv-folded)
# P7 head matches the training head.

[model]
name = "dense_cnn"
module = "hexo_models.dense_cnn.plugin"

[model.config]
device = "cuda"

[model.config.architecture]
input_channels = 13
channels = 96
residual_blocks = 6
dropout = 0.0
short_term_value_horizons = [1, 4, 8]

[model.config.training]
batch_size = 256
learning_rate = 0.001
weight_decay = 0.0001
policy_weight = 1.0
value_weight = 1.0
opp_policy_weight = 0.25
short_term_value_weight = 0.25
amp = true
max_grad_norm = 1.0
train_samples_per_epoch = 100000
max_train_bucket_per_new_data = 8.0
max_train_bucket_size = 500000
no_repeat_files = true
max_validation_samples = 100000

[model.config.samples]
shuffle_min_rows = 100000
# Kept at the RAM-safe 300000 (see scratch_64 notes: 600000 crash-looped the
# shuffle on the 12 GB host budget). P8 freed eval-cache host RAM; re-widening is a
# separate decision to validate against the watchdog, not bundled here.
shuffle_keep_target_rows = 300000
shuffle_taper_window_exponent = 0.65
shuffle_expand_window_per_row = 0.4
shuffle_taper_window_scale = 50000.0
approx_rows_per_out_file = 8000
shuffle_worker_group_size = 8000
validation_fraction = 0.0
policy_surprise_uniform_fraction = 0.5
policy_surprise_max_weight = 8.0

[model.config.selfplay]
# The co-primary fix: 512 search visits (4x) to generate sharp, well-explored
# policy targets that the P7 head + bigger trunk can actually learn from.
search_visits = 512
active_games = 256
c_puct = 1.5
root_dirichlet_noise_enabled = true
root_dirichlet_noise_fraction = 0.25
root_dirichlet_total_alpha = 10.83
root_policy_temperature = 1.1
fpu_reduction = 0.20
virtual_loss = 1.0
widening_policy_mass = 0.95
widening_max_children = 32
widening_min_children = 2
# Host-RAM headroom (P8): the eval cache is CPU priors, throughput-neutral here.
mcts_session_cache_max_states = 131072
mcts_active_root_limit = 256
max_actions = 1024
temperature = 1.0

[model.config.evaluation]
games_per_epoch = 64
sealbot_variant = "best"
sealbot_time_limit = 0.05
max_actions = 1024
require_sealbot = true
opening_temperature = 0.6
opening_moves = 8
# OPTIONAL eval-speed lever (Phase 3): a value >0 fattens the single-game eval
# forwards (fewer passes -> lower latency, ~3.4x from 4->32 at 512 sims) at a
# modest search-quality cost. Left at 0 (unchanged) pending a SealBot-strength
# validation on the trained net. To cut eval wall time, try 8-16 and confirm the
# win rate holds:
# virtual_batch_size = 16

[model.config.performance]
calibrate = true
target_selfplay_positions_per_second = 64.0
inference_batch_candidates = [128, 256, 512, 1024]
selfplay_batch_candidates = [256]
# bs256 fits 96x6 at ~32% VRAM (measured); the calibration OOM guard still drops
# any candidate that OOMs and selects the largest viable batch automatically.
training_batch_candidates = [64, 128, 192, 256]
mcts_virtual_batch_candidates = [4]
selfplay_probe_positions = 2048
probe_batches = 1
# Inference-forward optimizations (see analysis/throughput_understanding.md).
#  - inference_use_tensorrt: route the MCTS eval forward through a TensorRT FP16
#    engine. GATED OFF — VALIDATION FOUND TRT FP16 PRODUCES NaN value outputs on
#    some real positions during 512-sim search (strongly-typed pure-fp16 overflow;
#    the Rust finiteness guard catches it, but it would crash-loop a real run).
#    The torch FP16 (autocast, mixed-precision) path is safe and is used instead.
#    Do NOT enable for real training-data generation until the fp16 overflow is
#    fixed (keep value head / sensitive layers fp32, or INT8-calibrate) AND a
#    SealBot best-50ms strength A/B confirms no win-rate regression. The
#    integration (build + correctness gate + torch fallback) is in place and works.
#  - inference_bucket_pad_multiple: round the padded forward batch up to this
#    multiple instead of a power of two (less padding waste). 0 = power-of-two.
#    Equivalence-preserving (verified) — kept ON.
inference_use_tensorrt = false
inference_bucket_pad_multiple = 16

[run]
name = "dense_cnn_model1_target_96x6"
output_dir = "../runs/dense_cnn_model1_target_96x6"
seed = 1

[loop]
epochs = 60

[selfplay]
# ROLLING REPLENISHMENT (ADOPTED): games_per_epoch > active_games (256) keeps the
# active pool full as games finish — the selfplay loop tops up to active_games
# until games_per_epoch is reached, so concurrency holds ~256 for the bulk of the
# epoch instead of the old fixed-cohort drain (which spent its tail at low
# concurrency / low cache-hit / low GPU duty, ~20x slower per position). 1024 = a
# 4x-longer epoch (4x more self-play samples) with the low-concurrency tail cut to
# the final 256-game cohort instead of the whole epoch. 512 = a 2x-longer epoch
# (2x samples) with the pool full for the first ~256 games, then the final
# 256-game drain (~50% of games at full concurrency vs 0% for the old fixed
# cohort). Middle-ground choice; tunable higher to shrink the tail fraction at
# the cost of longer epochs. NOTE: a longer epoch delays the per-epoch checkpoint
# — the supervisor no-progress window was widened to tolerate it.
games_per_epoch = 512
update_checkpoint_pointer = true
checkpoint_pointer = "../data/checkpoints/dense_cnn_model1_target_96x6_latest.txt"

[train]
passes_per_epoch = 1

[checkpoint]
# Fresh run: no resume_from (the supervisor injects resume_from=<latest epoch_*.pt>
# on each relaunch; first launch has none and uses initialize_from below).
# initialize_from is the FRESH SealBot-bootstrapped prefit for THIS architecture
# (96x6 + P7), generated by scripts/bootstrap_dense_cnn_sealbot.py. The old 64x4/
# FC-head bootstrap is shape-incompatible and is NOT reused.
initialize_from = "../runs/dense_cnn_model1_target_96x6/checkpoints/bootstrap_sealbot_prefit.pt"
save_name = "latest"
