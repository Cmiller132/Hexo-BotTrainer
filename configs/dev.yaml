game:
  name: hexo
  crop_size: 31
  rules_version: 1
  max_placements: 300

model:
  package: hexo_resnet
  variant: small
  channels: 64
  residual_blocks: 6
  precision: fp16

selfplay:
  games_per_cycle: 200
  actors: 8
  mcts_visits: 64
  temperature_placements: 24
  dirichlet_noise: true

mcts:
  c_puct: 1.5
  root_noise_alpha: 0.3
  root_noise_frac: 0.25

inference:
  batch_size: 64
  device: cuda

training:
  batch_size: 256
  steps_per_cycle: 500
  replay_window_samples: 100000
  learning_rate: 0.0003
  weight_decay: 0.0001
  amp: true
  grad_clip_norm: 1.0

checkpointing:
  latest_path: data/checkpoints/latest.pt
  keep_last: 10

loop:
  cycles: 1000

