[model]
name = "dense_cnn"
module = "hexo_models.dense_cnn.plugin"

[model.config]
device = "cuda"

[model.config.architecture]
input_channels = 13
channels = 64
residual_blocks = 4
dropout = 0.0
lookahead_horizons = [1, 4, 8]

[model.config.training]
batch_size = 128
learning_rate = 0.001
weight_decay = 0.0001
policy_weight = 1.0
value_weight = 1.0
opp_policy_weight = 0.25
lookahead_weight = 0.25
amp = true
max_grad_norm = 1.0

[model.config.samples]
capacity = 200000
train_sample_count = 4096
recency_halflife = 50000.0
compression_level = 6

[model.config.selfplay]
samples_per_epoch = 65536
search_visits = 128
active_games = 2048
min_mcts_samples_per_game = 32
progressive_widening_initial_actions = 8
progressive_widening_child_initial_actions = 4
progressive_widening_candidate_actions = 128
progressive_widening_growth_interval = 256.0
progressive_widening_growth_base = 1.3
root_dirichlet_noise_enabled = true
root_dirichlet_noise_fraction = 0.25
root_dirichlet_alpha = 0.03
hidden_prior_mass = 0.05
fpu_reduction = 0.20
virtual_loss = 1.0
mcts_session_cache_max_states = 1048576
mcts_active_root_limit = 1024
max_actions = 1024
temperature = 1.0

[model.config.evaluation]
games_per_epoch = 64
sealbot_variant = "best"
sealbot_time_limit = 0.05
max_actions = 1024
require_sealbot = true

[model.config.performance]
calibrate = true
target_selfplay_positions_per_second = 128.0
inference_batch_candidates = [128, 256, 512, 1024]
selfplay_batch_candidates = [2048]
training_batch_candidates = [64, 128, 192, 256]
mcts_virtual_batch_candidates = [4]
selfplay_probe_positions = 8192
probe_batches = 1

[run]
name = "dense_cnn_model1"
output_dir = "../runs/dense_cnn_model1"
seed = 1

[loop]
epochs = 30

[selfplay]
games_per_epoch = 4096
update_checkpoint_pointer = true
checkpoint_pointer = "../data/checkpoints/dense_cnn_model1_latest.txt"

[samples]
train_sample_count = 4096

[train]
passes_per_epoch = 1

[checkpoint]
resume_from = "../data/checkpoints/dense_cnn_model1_latest.txt"
save_name = "latest"
