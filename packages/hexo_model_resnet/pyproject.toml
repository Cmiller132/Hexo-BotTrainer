[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "hexo-model-resnet"
version = "0.1.0"
description = "Small PyTorch ResNet model plugin for Hexo RL."
requires-python = ">=3.11"
dependencies = [
  "torch>=2.2",
  "hexo-utils==0.1.0",
]

[project.entry-points."hexo_utils.models"]
hexo_model_resnet = "hexo_model_resnet:get_plugin"

[tool.hatch.build.targets.wheel]
packages = ["python/hexo_model_resnet"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
