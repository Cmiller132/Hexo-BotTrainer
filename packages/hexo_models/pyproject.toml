[build-system]
requires = ["maturin>=1.7,<2"]
build-backend = "maturin"

[project]
name = "hexo-models"
version = "0.1.0"
description = "Production Hexo self-play models and training utilities."
requires-python = ">=3.11"
dependencies = [
  "torch>=2.2",
  "hexo-engine==0.1.0",
  "hexo-runner==0.1.0",
  "hexo-train==0.1.0",
]

[project.entry-points."hexo_train.models"]
dense_cnn = "hexo_models.dense_cnn.plugin:get_plugin"
hexformer_ar = "hexo_models.hexformer_ar.plugin:get_plugin"

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
extraPaths = [
  "python",
  "dense_cnn/python",
  "hexformer_ar/python",
]

[tool.maturin]
python-source = "python"
module-name = "hexo_models._rust"
features = ["python"]
include = [
  { path = "dense_cnn/python/hexo_models/dense_cnn/**/*", format = "wheel" },
  { path = "hexformer_ar/python/hexo_models/hexformer_ar/**/*", format = "wheel" },
  { path = "dense_cnn/python/hexo_models/dense_cnn/**/*", format = "sdist" },
  { path = "hexformer_ar/python/hexo_models/hexformer_ar/**/*", format = "sdist" },
  { path = "dense_cnn/rust/**/*", format = "sdist" },
  { path = "hexformer_ar/rust/**/*", format = "sdist" },
]
