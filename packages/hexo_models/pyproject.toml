[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "hexo-models"
version = "0.1.0"
description = "Production Hexo self-play models and training utilities."
requires-python = ">=3.11"
dependencies = [
  "torch>=2.2",
  "hexo-engine==0.1.0",
  "hexo-runner==0.1.0",
  "hexo-train==0.1.0",
]

[project.entry-points."hexo_train.models"]
dense_cnn = "hexo_models.dense_cnn.plugin:get_plugin"

[tool.hatch.build.targets.wheel]
packages = ["python/hexo_models"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
