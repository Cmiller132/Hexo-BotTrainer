[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "models-common"
version = "0.1.0"
description = "Placeholder Python package for the Rust models_common crate."
requires-python = ">=3.11"
dependencies = []

[tool.hatch.build.targets.wheel]
packages = ["python/models_common"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"

[tool.maturin]
python-source = "python"
module-name = "models_common._rust"
