[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "hexo-engine"
version = "0.1.0"
description = "Python package boundary for the Rust Hexo engine."
requires-python = ">=3.11"
dependencies = []

[tool.hatch.build.targets.wheel]
packages = ["python/hexo_engine"]

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"
