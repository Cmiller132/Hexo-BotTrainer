[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "hexo-engine"
version = "0.1.0"
description = "Python package boundary for the Rust Hexo engine."
requires-python = ">=3.11"
dependencies = []

[tool.pyright]
pythonVersion = "3.11"
typeCheckingMode = "basic"

[tool.setuptools.packages.find]
where = ["python"]
