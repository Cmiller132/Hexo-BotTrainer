<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hexo Match</title>
<link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<header>
  <h1>Hexo Match</h1>
  <div class="status"><span class="dot"></span><span id="statusText">Ready</span></div>
</header>
<main>
  <section class="top-grid">
    <section class="board-panel" aria-label="Game board">
      <div class="board-area" id="boardArea">
        <svg id="boardSvg"></svg>
        <div class="board-view-controls" aria-label="Board view controls">
          <button id="zoomInBtn" type="button" aria-label="Zoom in">+</button>
          <button id="zoomOutBtn" type="button" aria-label="Zoom out">-</button>
        </div>
        <div class="board-hud" id="cellHud">
          <div><span>Q:</span> <strong>0</strong> <span>R:</span> <strong>0</strong></div>
          <div>Cell: empty</div>
        </div>
        <div class="tip" id="tip"></div>
        <div class="legend">
          <span><span class="ldot" style="background:var(--p0)"></span>P0</span>
          <span><span class="ldot" style="background:var(--p1)"></span>P1</span>
          <span><span class="ldot" style="background:#101924;border:1px solid var(--border)"></span>Legal</span>
          <span class="tactic-legend"><span class="ldot" style="background:var(--green)"></span>Win</span>
          <span class="tactic-legend"><span class="ldot" style="background:var(--red)"></span>Block</span>
        </div>
      </div>
    </section>

    <aside class="side-stack" aria-label="Match controls">
      <section class="panel-card">
        <div class="section-title">State Summary</div>
        <div class="info">
          <div class="info-row"><span class="label">Player</span><span class="value" id="playerVal"></span></div>
          <div class="info-row"><span class="label">Phase</span><span class="value" id="phaseVal"></span></div>
          <div class="info-row"><span class="label">Stones</span><span class="value" id="stonesVal"></span></div>
          <div class="info-row"><span class="label">Legal Cells</span><span class="value" id="legalVal"></span></div>
          <div class="info-row"><span class="label">View</span><span class="value" id="viewVal"></span></div>
        </div>
      </section>

      <section class="panel-card">
        <div class="section-title">Controls</div>
        <div class="toolbar">
          <button id="newBtn">New</button>
          <button id="fitBtn">Fit</button>
          <button id="tacticsBtn">Tactics</button>
        </div>
      </section>

      <section class="panel-card tactics-card">
        <div class="section-title">Tactical Filters</div>
        <div class="overlay-controls">
          <div class="seg" id="modeSeg">
            <button data-mode="forcing">Forcing</button>
            <button data-mode="threats">Threats</button>
            <button data-mode="windows">Active</button>
            <button data-mode="all">All</button>
          </div>
          <div class="seg" id="playerSeg">
            <button data-player="both">Both</button>
            <button data-player="player0">P0</button>
            <button data-player="player1">P1</button>
          </div>
          <div class="seg" id="axisSeg">
            <button data-axis="all">Axis</button>
            <button data-axis="Q">Q</button>
            <button data-axis="R">R</button>
            <button data-axis="QR">QR</button>
          </div>
          <button id="inspectBtn">Inspect</button>
        </div>
      </section>

      <section class="panel-card tactical-stats-card">
        <div class="section-title">Tactical Stats</div>
        <div class="tactics-panel" id="tacticsPanel"></div>
      </section>
    </aside>
  </section>

  <section class="bottom-dock" aria-label="Move history and replay">
    <div class="history-panel">
      <div class="dock-title">Move History</div>
      <div class="move-history" id="moveHistory"></div>
    </div>
    <div class="replay-panel">
      <div class="dock-title">Replay Controls</div>
      <div class="replay-row">
        <div class="replay-buttons">
          <button id="replayStartBtn" aria-label="Start">|&lt;</button>
          <button id="replayPrevBtn" aria-label="Previous">&lt;</button>
          <button id="replayPlayBtn" aria-label="Play">Play</button>
          <button id="replayNextBtn" aria-label="Next">&gt;</button>
          <button id="replayLiveBtn" aria-label="Latest">&gt;|</button>
        </div>
        <div class="replay-status">
          <div id="replayLabel">0 / 0</div>
          <div id="replaySub">Opening</div>
        </div>
        <div class="slider-wrap">
          <input id="replaySlider" type="range" min="0" max="0" value="0" step="1">
          <div class="slider-ticks"><span>0</span><span id="replayMidTick">0</span><span id="replayMaxTick">0</span></div>
        </div>
      </div>
    </div>
  </section>
</main>
<script src="/static/app.js"></script>
</body>
</html>
